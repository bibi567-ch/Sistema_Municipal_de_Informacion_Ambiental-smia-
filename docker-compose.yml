
version: "3.9"

services:

  db:
    image: postgis/postgis:15-3.4
    container_name: smia_db
    environment:
      POSTGRES_DB: smia_db
      POSTGRES_USER: smia_user
      POSTGRES_PASSWORD: smia2026_seguro
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U smia_user -d smia_db"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: smia_redis
    ports:
      - "6379:6379"

  backend:
    build: ./backend
    container_name: smia_backend
    env_file:
      - .env
    ports:
      - "8000:8000"
    volumes:
      - ./backend:/app
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_started
    command: uvicorn app.main:app --host 0.0.0.0 --port 8000 --reload

volumes:
  postgres_data:
